<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>精氣神血津液 — 학습 허브</title>
<style>
  :root{
    --bg:#1b1613; --bg2:#211a15; --panel:#272019; --panel2:#2e261d;
    --ink:#ece0c8; --ink-dim:#a99a7e; --ink-faint:#7d7059;
    --line:rgba(236,224,200,.13); --line-strong:rgba(236,224,200,.26);
    --zhu:#cf4a2c; --zhu-soft:#e07a5f; --cheong:#6cae8b; --hwang:#d6a23a;
    --shadow:0 18px 50px -20px rgba(0,0,0,.7);
    --serif:"Nanum Myeongjo","Batang","Gungsuh",serif;
    --sans:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%, #2a2018 0%, var(--bg) 55%, #161210 100%);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 26px);mix-blend-mode:overlay}
  .sig{position:fixed;z-index:0;left:50%;top:46%;transform:translate(-50%,-50%);font-family:var(--serif);
    font-size:min(74vh,70vw);line-height:1;color:#000;opacity:.05;pointer-events:none;user-select:none;
    text-shadow:0 0 60px rgba(207,74,44,.25);animation:breathe 9s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.045;transform:translate(-50%,-50%) scale(1)}50%{opacity:.075;transform:translate(-50%,-50%) scale(1.035)}}

  .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:26px 20px 120px}
  header{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:12px;cursor:pointer}
  .brand .seal{font-family:var(--serif);font-size:28px;color:var(--zhu);border:2px solid var(--zhu);border-radius:7px;
    padding:1px 9px 4px;line-height:1;letter-spacing:2px;box-shadow:inset 0 0 0 1px rgba(207,74,44,.25)}
  .brand h1{font-family:var(--serif);font-weight:400;font-size:20px;margin:0;letter-spacing:.5px}
  .brand h1 b{color:var(--zhu-soft);font-weight:400}
  .eyebrow{font-size:11px;color:var(--ink-faint);letter-spacing:3px;text-transform:uppercase}
  .rightslot{display:flex;align-items:center;gap:18px}
  .stat{font-family:var(--serif);text-align:right} .stat .v{font-size:22px;color:var(--cheong)} .stat .l{font-size:10px;color:var(--ink-faint);letter-spacing:1px}
  .homebtn{font-family:var(--sans);font-size:13px;background:transparent;color:var(--ink-dim);border:1px solid var(--line-strong);
    border-radius:9px;padding:8px 15px;cursor:pointer;transition:.16s} .homebtn:hover{border-color:var(--zhu);color:var(--ink)}

  .dots{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--line-strong);background:transparent;
    cursor:pointer;position:relative;transition:.25s;display:grid;place-items:center}
  .dot span{font-size:8px;color:var(--ink-faint);position:absolute;top:16px;left:50%;transform:translateX(-50%)}
  .dot.done{background:rgba(108,174,139,.4);border-color:var(--cheong)}
  .dot.active{background:var(--zhu);border-color:var(--zhu);box-shadow:0 0 0 4px rgba(207,74,44,.18)}
  .dot:hover{border-color:var(--ink-dim)}

  .stage{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 140%);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow);padding:30px 30px 34px;min-height:340px;position:relative;overflow:hidden}
  .stage::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .g-num{font-family:var(--serif);font-size:13px;color:var(--zhu);letter-spacing:2px;margin-bottom:6px}
  .g-title{font-family:var(--serif);font-size:25px;font-weight:400;margin:0 0 4px;letter-spacing:.4px}
  .g-sub{color:var(--ink-dim);font-size:13.5px;line-height:1.6;margin:0 0 18px;max-width:62ch}

  .banner{display:flex;gap:9px;align-items:flex-start;background:rgba(214,162,58,.09);border:1px solid rgba(214,162,58,.35);
    border-radius:10px;padding:10px 13px;margin:0 0 18px;font-size:13px;color:#e6cd8e;line-height:1.55}
  .banner b{color:var(--hwang)} .banner .ic{color:var(--hwang);font-weight:700;flex:none}
  .banner.flag{background:rgba(207,74,44,.08);border-color:rgba(207,74,44,.4);color:#eab5a6}
  .banner.flag b{color:var(--zhu-soft)} .banner.flag .ic{color:var(--zhu-soft)}

  .qbox{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin-bottom:16px;min-height:64px;display:flex;align-items:center}
  .qtext{font-size:16px;line-height:1.75} .qtext .qlead{font-family:var(--serif);color:var(--zhu-soft);margin-right:8px}
  .hz{font-family:var(--serif);color:var(--ink);font-size:1.06em} .hz.z{color:var(--zhu-soft)}

  .opts{display:flex;flex-wrap:wrap;gap:10px}
  .opt{font-family:var(--serif);font-size:18px;letter-spacing:1px;background:var(--panel2);color:var(--ink);border:1px solid var(--line-strong);
    border-radius:10px;padding:13px 20px;cursor:pointer;transition:.16s;user-select:none;flex:1 1 auto;text-align:center;min-width:96px}
  .opt:hover{border-color:var(--zhu);transform:translateY(-1px);background:#352a20} .opt:active{transform:translateY(0)}
  .opt.correct{background:rgba(108,174,139,.16);border-color:var(--cheong);color:#c8ead6;cursor:default}
  .opt.wrong{background:rgba(207,74,44,.14);border-color:var(--zhu);color:#f3c3b6;cursor:default}
  .opt.muted{opacity:.4;cursor:default} .opt.reveal{border-color:var(--cheong);box-shadow:0 0 0 2px rgba(108,174,139,.3)}
  .opt.small{font-size:13.5px;padding:10px 13px;min-width:0;flex:1 1 30%}
  .opts.aslist{flex-direction:column}
  .opts.aslist .opt{font-family:var(--sans);font-size:14.5px;letter-spacing:0;text-align:left;flex:1 1 100%;padding:13px 16px;line-height:1.55}

  .mc-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
  .mc{display:flex;gap:12px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line-strong);border-radius:10px;
    padding:12px 15px;cursor:pointer;transition:.14s;font-size:14.5px;line-height:1.5} .mc:hover{border-color:var(--zhu)}
  .mc .box{flex:none;width:20px;height:20px;border:1.5px solid var(--line-strong);border-radius:5px;margin-top:1px;display:grid;place-items:center;font-size:13px;color:transparent;transition:.14s}
  .mc .tag{font-family:var(--serif);color:var(--zhu-soft);flex:none}
  .mc.on{border-color:var(--zhu);background:#352a20} .mc.on .box{background:var(--zhu);border-color:var(--zhu);color:#1b1613}
  .mc.ok{border-color:var(--cheong);background:rgba(108,174,139,.13)} .mc.ok .box{background:var(--cheong);border-color:var(--cheong);color:#15110d}
  .mc.bad{border-color:var(--zhu);background:rgba(207,74,44,.13)} .mc.miss{border-color:var(--cheong);box-shadow:0 0 0 2px rgba(108,174,139,.25)}
  .mc-check{font-family:var(--sans);font-size:13.5px;background:var(--hwang);color:#1b1613;font-weight:700;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;letter-spacing:.5px;transition:.16s}
  .mc-check:hover{filter:brightness(1.08)} .mc-check.hide{display:none}

  .fb{margin-top:16px;border-radius:11px;padding:14px 16px;font-size:13.5px;line-height:1.65;border:1px solid var(--line);background:var(--bg2);display:none}
  .fb.show{display:block;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fb .verdict{font-family:var(--serif);font-size:15px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
  .fb.ok .verdict{color:var(--cheong)} .fb.no .verdict{color:var(--zhu-soft)}
  .fb .note{color:var(--ink-dim)} .fb .note b{color:var(--ink)}

  .row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:16px}
  .meter{font-size:12.5px;color:var(--ink-faint);letter-spacing:.5px;font-family:var(--serif)} .meter b{color:var(--zhu-soft)}
  .nextq{font-family:var(--sans);font-size:13.5px;background:var(--zhu);color:#1b1613;font-weight:700;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;letter-spacing:.5px;transition:.16s;display:none}
  .nextq.show{display:inline-block} .nextq:hover{background:var(--zhu-soft)} .nextq.done{background:var(--cheong)}

  .slot-layout{margin-bottom:18px}
  .slot{display:inline-flex;align-items:center;justify-content:center;min-width:74px;min-height:44px;padding:6px 12px;border:1.5px dashed var(--line-strong);
    border-radius:9px;font-family:var(--serif);font-size:17px;color:var(--ink-faint);cursor:pointer;transition:.16s;vertical-align:middle;background:rgba(0,0,0,.12)}
  .slot.sel-target{border-color:var(--zhu);box-shadow:0 0 0 3px rgba(207,74,44,.16)}
  .slot.filled{border-style:solid;border-color:var(--cheong);color:#cdeada;background:rgba(108,174,139,.12);cursor:default}
  .slot.shake{animation:shake .3s} @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .static-box{display:inline-flex;align-items:center;justify-content:center;min-width:60px;min-height:40px;padding:5px 11px;border:1px solid var(--line);
    border-radius:8px;font-family:var(--serif);font-size:15px;color:var(--ink-dim);vertical-align:middle;background:rgba(255,255,255,.02)}
  .arrow{color:var(--zhu);font-size:15px;margin:0 4px}
  .tier-label{font-size:11px;color:var(--ink-faint);letter-spacing:2px;margin:14px 0 7px;text-transform:uppercase}
  .defrow{display:flex;align-items:center;gap:12px;margin:9px 0;flex-wrap:wrap}
  .defrow .ph{font-family:var(--serif);font-size:15px;color:var(--ink-dim);flex:1;min-width:240px;line-height:1.5} .defrow .eq{color:var(--zhu);font-family:var(--serif)}
  .bank{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px;padding-top:16px;border-top:1px solid var(--line)}
  .chip{font-family:var(--serif);font-size:16px;background:var(--panel2);border:1px solid var(--line-strong);border-radius:9px;padding:9px 16px;cursor:pointer;transition:.14s;user-select:none}
  .chip:hover{border-color:var(--zhu);transform:translateY(-1px)} .chip.sel{background:var(--zhu);color:#1b1613;border-color:var(--zhu)}
  .chip.used{opacity:.25;pointer-events:none;text-decoration:line-through}

  table.cmp{border-collapse:collapse;width:100%;margin-bottom:6px;font-size:13.5px}
  table.cmp th,table.cmp td{border:1px solid var(--line);padding:7px 5px;text-align:center}
  table.cmp th{font-family:var(--serif);color:var(--zhu-soft);font-weight:400;font-size:12.5px;background:rgba(0,0,0,.18)}
  table.cmp td.rowhead{font-family:var(--serif);color:var(--ink);font-size:16px;background:rgba(0,0,0,.18)}
  table.cmp td .slot{min-width:52px;min-height:34px;font-size:13.5px;padding:3px 5px} table.cmp td.pre{font-family:var(--serif);color:var(--ink-dim);font-size:13px}
  table.grid{border-collapse:collapse;margin:0 auto 6px;font-size:15px}
  table.grid th,table.grid td{border:1px solid var(--line);padding:10px 14px;text-align:center}
  table.grid th{font-family:var(--serif);color:var(--zhu-soft);font-weight:400;font-size:14px;background:rgba(0,0,0,.18)}
  table.grid td.rowhead{font-family:var(--serif);color:var(--ink);font-size:14px;background:rgba(0,0,0,.18);white-space:nowrap}
  .sanbao{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-top:6px}
  .sanbao .pair{display:flex;flex-direction:column;align-items:center;gap:6px} .sanbao .pair .lab{font-family:var(--serif);font-size:18px;color:var(--ink-dim)}

  .order-status{font-family:var(--serif);font-size:14px;color:var(--ink-dim);margin-bottom:14px} .order-status b{color:var(--zhu-soft)}
  .order-cards{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px}
  .ocard{position:relative;flex:1 1 150px;min-width:140px;background:var(--panel2);border:1px solid var(--line-strong);border-radius:12px;padding:16px 16px 14px;cursor:pointer;transition:.16s}
  .ocard:hover{border-color:var(--zhu);transform:translateY(-2px)} .ocard:active{transform:none}
  .ocard .lab{font-family:var(--serif);font-size:20px;margin-bottom:6px} .ocard .gl{font-size:12px;color:var(--ink-dim);line-height:1.5}
  .ocard.locked{border-color:var(--cheong);background:rgba(108,174,139,.12);cursor:default} .ocard.locked .lab{color:#cdeada}
  .ocard .badge{position:absolute;top:-9px;left:-9px;width:26px;height:26px;border-radius:50%;background:var(--cheong);color:#15110d;font-family:var(--serif);font-weight:700;display:none;align-items:center;justify-content:center;font-size:14px}
  .ocard.locked .badge{display:flex} .ocard.shake{animation:shake .3s}

  .lead{font-size:15px;line-height:1.85;color:var(--ink-dim);max-width:62ch;margin:0 0 22px} .lead b{color:var(--ink)}
  .menu{display:flex;flex-direction:column;gap:2px;margin:6px 0 22px}
  .menu .it{display:flex;gap:13px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line)}
  .menu .it .n{font-family:var(--serif);color:var(--zhu);font-size:15px;flex:none;width:30px} .menu .it .t{font-family:var(--serif);font-size:16px}
  .start-cta{font-family:var(--serif);font-size:16px;color:var(--zhu-soft);margin-top:6px}

  .home-grid{display:flex;flex-direction:column;gap:12px}
  .home-card{display:flex;align-items:center;gap:17px;background:rgba(0,0,0,.14);border:1px solid var(--line);border-radius:13px;padding:16px 18px;cursor:pointer;transition:.18s}
  .home-card:hover{border-color:var(--zhu);transform:translateY(-2px);background:#2c241b}
  .home-card .ko{font-family:var(--serif);font-size:28px;color:var(--zhu);width:44px;text-align:center;flex:none}
  .home-card .body{flex:1;min-width:0}
  .home-card .t{font-family:var(--serif);font-size:17px;margin-bottom:3px;display:flex;align-items:baseline;gap:9px}
  .home-card .t .gm{font-size:11.5px;color:var(--ink-faint);font-family:var(--sans);flex:none}
  .home-card .d{color:var(--ink-dim);font-size:12.5px;line-height:1.45}
  .home-card .go{color:var(--ink-faint);font-size:18px;flex:none;transition:.18s}
  .home-card:hover .go{color:var(--zhu-soft);transform:translateX(3px)}

  .scoreline{font-family:var(--serif);font-size:20px;margin:18px 0 8px} .scoreline b{color:var(--cheong)}
  .bargrid{display:flex;flex-direction:column;gap:8px;margin:16px 0 8px}
  .bargrid .b{display:flex;align-items:center;gap:12px;font-size:13px}
  .bargrid .b .nm{font-family:var(--serif);flex:none;color:var(--ink-dim);min-width:185px}
  .bargrid .b .track{flex:1;height:8px;background:rgba(0,0,0,.3);border-radius:5px;overflow:hidden}
  .bargrid .b .fill{height:100%;background:linear-gradient(90deg,var(--zhu),var(--cheong));border-radius:5px;transition:width .6s}
  .bargrid .b .pc{font-family:var(--serif);color:var(--ink-dim);width:54px;text-align:right}
  .restart{font-family:var(--sans);font-size:13.5px;background:transparent;color:var(--ink-dim);border:1px solid var(--line-strong);border-radius:9px;padding:10px 18px;cursor:pointer;margin-top:14px}
  .restart:hover{border-color:var(--zhu);color:var(--ink)}

  .footbar{position:fixed;left:0;right:0;bottom:0;z-index:5;display:flex;justify-content:center;gap:12px;align-items:center;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--bg) 60%,transparent);font-size:13px;color:var(--ink-dim);flex-wrap:wrap}
  .footbar.hide{display:none}
  .navbtn{font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.5px;border-radius:11px;
    padding:13px 26px;cursor:pointer;transition:.16s;user-select:none;-webkit-user-select:none;min-height:48px;
    background:var(--zhu);color:#1b1613;border:1px solid var(--zhu);box-shadow:0 6px 18px -8px rgba(207,74,44,.7)}
  .navbtn:hover{background:var(--zhu-soft);border-color:var(--zhu-soft)} .navbtn:active{transform:translateY(1px)}
  .navbtn.prev{background:transparent;color:var(--ink-dim);border:1px solid var(--line-strong);box-shadow:none;font-weight:400}
  .navbtn.prev:hover{border-color:var(--zhu);color:var(--ink);background:rgba(207,74,44,.06)}
  .footbar .hint{font-size:11px;color:var(--ink-faint);letter-spacing:1px;flex-basis:100%;text-align:center;margin-top:2px}
  kbd{font-family:var(--sans);background:#3a2f23;border:1px solid var(--line-strong);border-bottom-width:2px;border-radius:6px;padding:2px 9px;font-size:12px;color:var(--ink);letter-spacing:1px}

  @media(max-width:620px){
    .wrap{padding:18px 13px 130px} .stage{padding:22px 18px 26px} .g-title{font-size:21px}
    .opt{font-size:16px;padding:12px 14px;min-width:0;flex:1 1 28%} .opt.small{flex:1 1 45%}
    table.cmp{font-size:11.5px} table.grid{font-size:13px} .bargrid .b .nm{min-width:120px;font-size:12px}
    .ocard{flex:1 1 44%;min-width:0} .home-card .d{display:none} .defrow .ph{min-width:0}
  }
  @media(prefers-reduced-motion:reduce){.sig{animation:none}.fb.show{animation:none}.slot.shake,.ocard.shake{animation:none}}

  /* --- 터치 기기(태블릿/아이패드) 최적화 --- */
  .opt,.mc,.chip,.slot,.ocard,.dot,.home-card,.navbtn,.homebtn,.nextq,.mc-check,.restart,.start-cta,.brand,.opt.small{touch-action:manipulation}
  @media(pointer:coarse){
    .dot{width:18px;height:18px} .dot span{top:21px;font-size:9px}
    .dots{gap:14px}
    .opt{padding:15px 22px;min-height:50px} .opt.small{padding:13px 14px}
    .mc{padding:15px 16px} .mc .box{width:23px;height:23px}
    .chip{padding:13px 18px;font-size:17px}
    .slot{min-height:50px;min-width:80px}
    table.cmp td .slot{min-height:40px;min-width:56px}
    .ocard{padding:18px 16px}
    .nextq,.mc-check{padding:14px 24px;font-size:15px;min-height:48px}
    .home-card{padding:18px 18px}
    .start-cta{cursor:pointer}
  }
</style>
</head>
<body>
<div class="sig" id="sig" aria-hidden="true">氣</div>
<div class="wrap">
  <header>
    <div class="topline">
      <div class="brand" id="brand">
        <div class="seal" id="seal">氣</div>
        <div>
          <div class="eyebrow">韓醫學槪論 · 編4</div>
          <h1>精氣神血津液 <b>학습 허브</b></h1>
        </div>
      </div>
      <div class="rightslot" id="rightslot"></div>
    </div>
    <div class="dots" id="dots"></div>
  </header>
  <main class="stage" id="stage"></main>
</div>
<div class="footbar" id="footbar">
  <button class="navbtn prev" id="navPrev">&larr; 이전 / 홈</button>
  <button class="navbtn next" id="navNext">다음 게임 &rarr;</button>
  <div class="hint">답·배치·순서는 화면을 탭 · 키보드: <kbd>Space</kbd> 다음 / <kbd>&larr;</kbd> 이전</div>
</div>

<script>
(function(){
  "use strict";
  function el(tag, attrs, html){
    var n=document.createElement(tag);
    if(attrs) for(var k in attrs){ if(k==="class")n.className=attrs[k]; else n.setAttribute(k,attrs[k]); }
    if(html!=null) n.innerHTML=html; return n;
  }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  function bannerEl(text, flag){
    var b=el("div",{class:"banner"+(flag?" flag":"")});
    b.appendChild(el("span",{class:"ic"}, flag?"\u203b":"\u26a0")); b.appendChild(el("span",null,text)); return b;
  }
  var SCORE={}, CURRENT=null;
  function recordScore(num,c,t){ if(!SCORE[CURRENT])SCORE[CURRENT]={}; SCORE[CURRENT][num]={correct:c,total:t}; renderDots();

  /* ===== shell / nav ===== */
  var view='home', games=[], nums=[], stages=[], cur=0;
  var stageEl=document.getElementById("stage"), dotsEl=document.getElementById("dots");
  var rightSlot=document.getElementById("rightslot"), footbar=document.getElementById("footbar");
  var brand=document.getElementById("brand"), sealEl=document.getElementById("seal"), sigEl=document.getElementById("sig");
  brand.addEventListener("click", backHome);

  var TOTAL_GAMES=SECTIONS.reduce(function(a,s){return a+s.count;},0);

  function makeIntro(sec, gs){ return { mount:function(root){
    root.appendChild(el("div",{class:"g-num"},"\u7cbe\u6c23\u795e\u8840\u6d25\u6db2 \u00b7 "+sec.name));
    root.appendChild(el("h2",{class:"g-title"},sec.name));
    root.appendChild(el("p",{class:"lead"},sec.intro));
    var menu=el("div",{class:"menu"});
    gs.forEach(function(g){ var it=el("div",{class:"it"}); it.appendChild(el("span",{class:"n"},g.num)); it.appendChild(el("span",{class:"t"},g.title)); menu.appendChild(it); });
    root.appendChild(menu);
    var cta=el("div",{class:"start-cta"},"\u2b9a \ub20c\ub7ec\uc11c \uc2dc\uc791 (\ub610\ub294 \uc544\ub798 \u2018\ub2e4\uc74c \uac8c\uc784 \u2192\u2019)");
    cta.addEventListener("click",function(){ go(cur+1); });
    root.appendChild(cta);
  }};}

  function makeOutro(sec, gs){ return { mount:function(root){
    var sc=SCORE[sec.key]||{}, totC=0,totT=0;
    root.appendChild(el("div",{class:"g-num"},sec.name+" \u00b7 \uc644\ub8cc"));
    root.appendChild(el("h2",{class:"g-title"},sec.name+" \ud1b5\uacfc"));
    var grid=el("div",{class:"bargrid"});
    gs.forEach(function(g){ var s=sc[g.num]||{correct:0,total:0}; totC+=s.correct; totT+=s.total;
      var pc=s.total?Math.round(s.correct/s.total*100):0;
      var b=el("div",{class:"b"}); b.appendChild(el("span",{class:"nm"},"\uac8c\uc784 "+g.num+" \u00b7 "+g.title));
      var tr=el("div",{class:"track"}),fl=el("div",{class:"fill"});fl.style.width=pc+"%";tr.appendChild(fl);b.appendChild(tr);
      b.appendChild(el("span",{class:"pc"}, s.total?(s.correct+"/"+s.total):"\u2014")); grid.appendChild(b); });
    var sl=el("div",{class:"scoreline"}); sl.innerHTML="\ud569\uacc4 <b>"+totC+"</b> / "+totT+(totT?(" \u00b7 "+Math.round(totC/totT*100)+"%"):"");
    root.appendChild(sl); root.appendChild(grid);
    var hb=el("button",{class:"restart"},"\u21a9 \ud648\uc73c\ub85c"); hb.addEventListener("click", backHome); root.appendChild(hb);
  }};}

  function setHeaderHome(){
    sealEl.textContent="\u6c23"; sigEl.textContent="\u6c23";
    rightSlot.innerHTML="";
    var s1=el("div",{class:"stat"}); s1.innerHTML='<div class="v">'+SECTIONS.length+'</div><div class="l">\ud5c8\ube0c</div>';
    var s2=el("div",{class:"stat"}); s2.innerHTML='<div class="v">'+TOTAL_GAMES+'</div><div class="l">\uac8c\uc784</div>';
    rightSlot.appendChild(s1); rightSlot.appendChild(s2);
  }
  function setHeaderSection(sec){
    sealEl.textContent=sec.char; sigEl.textContent=sec.char;
    rightSlot.innerHTML="";
    var hb=el("button",{class:"homebtn"},"\u2190 \ud648"); hb.addEventListener("click", backHome); rightSlot.appendChild(hb);
  }

  function renderDots(){
    if(view!=='section'){ dotsEl.style.display="none"; dotsEl.innerHTML=""; return; }
    dotsEl.style.display=""; dotsEl.innerHTML="";
    var sc=SCORE[CURRENT]||{};
    nums.forEach(function(n,idx){ var si=idx+1;
      var d=el("div",{class:"dot"+(sc[n]?" done":"")+(cur===si?" active":"")}); d.appendChild(el("span",null,String(n)));
      d.addEventListener("click",function(){ go(si); }); dotsEl.appendChild(d);
    });
  }

  function renderHome(){
    view='home'; CURRENT=null; setHeaderHome(); renderDots(); footbar.classList.add("hide");
    stageEl.innerHTML=""; stageEl.style.opacity="0";
    stageEl.appendChild(el("p",{class:"lead"},
      "\ud0ed(\ub610\ub294 \uc2a4\ud398\uc774\uc2a4\ubc14)\uc73c\ub85c \uac8c\uc784 \uc0ac\uc774\ub97c \uad00\ud1b5\ud558\ub294 \ubcc0\ubcc4 \ud559\uc2b5 \ud5c8\ube0c \ub2e4\uc12f \ud3b8. \uc544\ub798 \uce78\uc744 \ub20c\ub7ec \uc2dc\uc791\ud558\uc138\uc694."));
    var grid=el("div",{class:"home-grid"});
    SECTIONS.forEach(function(sec,i){
      var card=el("div",{class:"home-card"});
      card.appendChild(el("div",{class:"ko"},sec.char));
      var body=el("div",{class:"body"});
      var t=el("div",{class:"t"}); t.appendChild(el("span",null,(i+1)+". "+sec.name)); t.appendChild(el("span",{class:"gm"},sec.count+"\uac8c\uc784"));
      body.appendChild(t); body.appendChild(el("div",{class:"d"}, sec.intro));
      card.appendChild(body); card.appendChild(el("div",{class:"go"},"\u25b8"));
      card.addEventListener("click",function(){ enterSection(i); }); grid.appendChild(card);
    });
    stageEl.appendChild(grid);
    var hubBtn=el("button",{class:"start-cta"},"\u25a4 \ud559\uc2b5 \ud604\ud669 \u2014 \ub2ec\ub825 \u00b7 \uc57d\uc810 \ubd84\uc11d \u00b7 \ub2e4\uc774\uc81c\uc2a4\ud2b8");
    hubBtn.addEventListener("click", showHub);
    stageEl.appendChild(hubBtn);
    requestAnimationFrame(function(){ stageEl.style.transition="opacity .25s"; stageEl.style.opacity="1"; });
  }
  function showHub(){
    view='hub'; CURRENT=null; setHeaderHome(); renderDots(); footbar.classList.add("hide");
    stageEl.innerHTML=""; stageEl.style.opacity="0";
    var back=el("button",{class:"homebtn"},"\u2190 \ud648"); back.addEventListener("click", backHome); stageEl.appendChild(back);
    var root=el("div",{}); root.id="hub-root"; stageEl.appendChild(root);
    if(window.HubHome){ window.HubHome.mount(root,{ key:'jongqishinhyul', title:'\u7cbe\u6c23\u795e\u8840\u6d25\u6db2 \ud559\uc2b5 \ud5c8\ube0c', kicker:'\u7cbe\u6c23\u795e\u8840\u6d25\u6db2 \u00b7 \ud604\ud669',
      drill:function(tool){ for(var i=0;i<SECTIONS.length;i++){ if(SECTIONS[i].key===tool){ enterSection(i); return; } } },
      toolLabel:function(k){ for(var i=0;i<SECTIONS.length;i++){ if(SECTIONS[i].key===k) return SECTIONS[i].name; } return k; } }); }
    else { stageEl.appendChild(el("p",{class:"lead"},"\ud559\uc2b5 \ud604\ud669 \ubaa8\ub4c8\uc744 \ubd88\ub7ec\uc624\uc9c0 \ubabb\ud588\uc2b5\ub2c8\ub2e4. \uc0c8\ub85c\uace0\uce68 \ud574\uc8fc\uc138\uc694.")); }
    requestAnimationFrame(function(){ stageEl.style.transition="opacity .25s"; stageEl.style.opacity="1"; });
  }

  function enterSection(i){
    var sec=SECTIONS[i]; CURRENT=sec.key; SCORE[sec.key]={};
    games=sec.build(); nums=games.map(function(g){return g.num;});
    stages=[makeIntro(sec,games)].concat(games).concat([makeOutro(sec,games)]);
    view='section'; cur=0; setHeaderSection(sec); footbar.classList.remove("hide"); renderStage();
  }
  function renderStage(){
    stageEl.innerHTML=""; stageEl.style.opacity="0";
    stages[cur].mount(stageEl); renderDots(); window.scrollTo({top:0,behavior:"smooth"});
    requestAnimationFrame(function(){ stageEl.style.transition="opacity .25s"; stageEl.style.opacity="1"; });
  }
  function go(i){ if(i<0)i=0; if(i>stages.length-1)i=stages.length-1; cur=i; renderStage(); }
  function backHome(){ renderHome(); window.scrollTo({top:0,behavior:"smooth"}); }

  document.addEventListener("keydown",function(e){
    if(view!=='section'){ if(e.code==="Space")e.preventDefault(); return; }
    if(e.code==="Space"){ e.preventDefault(); go(cur+1); }
    else if(e.code==="ArrowLeft"){ e.preventDefault(); if(cur>0) go(cur-1); else backHome(); }
    else if(e.code==="ArrowRight"){ e.preventDefault(); go(cur+1); }
  });

  /* 터치 네비게이션 (키보드 없는 아이패드/태블릿용) */
  document.getElementById("navNext").addEventListener("click",function(){
    if(view!=='section')return; go(cur+1);
  });
  document.getElementById("navPrev").addEventListener("click",function(){
    if(view!=='section')return; if(cur>0) go(cur-1); else backHome();
  });

  renderHome();
})();
</script>

<script id="hh-core">
(function(){
"use strict";
var CFG=null, ST=null, root=null, curView='cal', calYM=null;

function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function today(){return iso(new Date());}
function addDays(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return iso(d);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function strip(s){return String(s==null?'':s).replace(/<[^>]+>/g,'');}
function readJSON(k){try{return JSON.parse(window.localStorage.getItem(k));}catch(e){return null;}}

function skey(){return (CFG&&CFG.key?CFG.key:'hub')+'_home_v1';}
function blank(){return {days:{},q:{},tools:{},started:Date.now()};}
function load(){var o=readJSON(skey()); if(o&&o.days&&o.q){o.tools=o.tools||{};return o;} return blank();}
function save(){try{window.localStorage.setItem(skey(),JSON.stringify(ST));}catch(e){}}
function ensureST(){if(!ST)ST=load();return ST;}
function setKey(k){if(!CFG)CFG={};if(k)CFG.key=k;ST=null;}

/* ---- recording ---- */
function bumpDay(correct,n){ensureST();var t=today();var d=ST.days[t]||{a:0,c:0};d.a+=(n||1);if(correct)d.c+=(n||1);ST.days[t]=d;}
function tick(correct){bumpDay(!!correct,1);save();}
function touch(tool){ensureST();var t=today();var d=ST.days[t]||{a:0,c:0};ST.days[t]=d;if(tool){var x=ST.tools[tool]||{visits:0};x.visits++;x.last=t;ST.tools[tool]=x;}save();}
function record(tool,qid,o){
  ensureST();o=o||{};var id=String(qid);
  var Q=ST.q[id]||{tool:tool||'',cat:o.cat||'기타',q:o.q||'',a:o.a||'',seen:0,wrong:0,picks:{},lastWrong:null};
  Q.seen++; if(o.cat)Q.cat=o.cat; if(o.q!=null)Q.q=o.q; if(o.a!=null)Q.a=o.a; if(tool)Q.tool=tool;
  var wrong=!!o.wrong; if(wrong){Q.wrong++;Q.lastWrong=today(); if(o.pick){Q.picks[o.pick]=(Q.picks[o.pick]||0)+1;}}
  ST.q[id]=Q; bumpDay(!wrong,1); save();
}
function logGame(tool,qid,o){
  ensureST();o=o||{};var id=String(qid);var total=o.total||0,correct=o.correct||0;var wrongN=Math.max(0,total-correct);
  var Q=ST.q[id]||{tool:tool||'',cat:o.cat||'기타',q:o.q||'',a:o.a||'',seen:0,wrong:0,picks:{},lastWrong:null};
  Q.seen+=total; Q.wrong+=wrongN; if(o.cat)Q.cat=o.cat; if(o.q!=null)Q.q=o.q; if(tool)Q.tool=tool; if(wrongN>0)Q.lastWrong=today();
  ST.q[id]=Q; if(correct>0)bumpDay(true,correct); if(wrongN>0)bumpDay(false,wrongN); save();
}

/* ---- normalized collectors (bridge or own store) ---- */
function bridge(){ if(CFG&&typeof CFG.bridge==='function'){ try{return CFG.bridge()||{};}catch(e){return {};} } return {}; }
function collectQ(){
  var b=bridge();
  if(b.q&&b.q.length){ return b.q.map(function(e){var s=e.seen||0,w=e.wrong||0;return {tool:e.tool||CFG.key,id:String(e.id),q:e.q||'',a:e.a||'',cat:e.cat||'기타',seen:s,wrong:w,wrongRate:s?Math.round(w/s*100):0,picks:e.picks||{},lastWrong:e.lastWrong||null};}); }
  return Object.keys(ST.q).map(function(id){var Q=ST.q[id];return {tool:Q.tool||CFG.key,id:id,q:Q.q,a:Q.a,cat:Q.cat||'기타',seen:Q.seen,wrong:Q.wrong,wrongRate:Q.seen?Math.round(Q.wrong/Q.seen*100):0,picks:Q.picks||{},lastWrong:Q.lastWrong};});
}
function collectCats(){
  var b=bridge();
  if(b.cats&&b.cats.length){ return b.cats.map(function(c){var s=c.seen||0,w=c.wrong||0;return {cat:c.cat,seen:s,wrong:w,rate:s?Math.round(w/s*100):0};}); }
  var m={}; collectQ().forEach(function(e){var c=m[e.cat]||{cat:e.cat,seen:0,wrong:0};c.seen+=e.seen;c.wrong+=e.wrong;m[e.cat]=c;});
  return Object.keys(m).map(function(k){var c=m[k];c.rate=c.seen?Math.round(c.wrong/c.seen*100):0;return c;});

function collectDays(){
  var out={}; ensureST();
  Object.keys(ST.days).forEach(function(d){var x=ST.days[d];out[d]={a:x.a||0,c:x.c||0};});
  var b=bridge();
  if(b.days){ Object.keys(b.days).forEach(function(d){var v=b.days[d];var a=(typeof v==='number')?v:(v.a||v.attempts||0);var c=(typeof v==='number')?0:(v.c||v.correct||0);var o=out[d]||{a:0,c:0};o.a+=a;o.c+=c;out[d]=o;}); }
  return out;
}

/* ---- stats helpers ---- */
function streakOf(days){var cur=today();if(!days[cur])cur=addDays(cur,-1);var n=0;while(days[cur]&&days[cur].a>0){n++;cur=addDays(cur,-1);}return n;}
function bestStreakOf(days){var ks=Object.keys(days).filter(function(d){return days[d].a>0;}).sort();if(!ks.length)return 0;var best=1,run=1;for(var i=1;i<ks.length;i++){if(addDays(ks[i-1],1)===ks[i]){run++;}else{run=1;}if(run>best)best=run;}return best;}
function summary(){
  var qs=collectQ(),days=collectDays();
  var seen=0,wrong=0; qs.forEach(function(e){seen+=e.seen;wrong+=e.wrong;});
  var dAtt=0,dCor=0; Object.keys(days).forEach(function(d){dAtt+=days[d].a;dCor+=days[d].c;});
  var studyDays=Object.keys(days).filter(function(d){return days[d].a>0;}).length;
  var t=today();var todayN=days[t]?days[t].a:0;
  var attempts=seen>0?seen:dAtt;
  var acc=attempts?Math.round((attempts-wrong)/attempts*100):0;
  return {seen:seen,wrong:wrong,attempts:attempts,acc:acc,studyDays:studyDays,streak:streakOf(days),best:bestStreakOf(days),today:todayN,weakQ:qs.filter(function(e){return e.wrong>0;}).length,trackedQ:qs.length,dAtt:dAtt,dCor:dCor};
}
var UNIT=function(){return (CFG&&CFG.unit)||'문';};

/* ===================== CALENDAR VIEW ===================== */
function renderCal(){
  var s=summary(),days=collectDays();
  var h='';
  h+='<div class="hh-tiles">'+
     tile('🔥','연속',s.streak+'일')+
     tile('🏆','최고 연속',s.best+'일')+
     tile('🗓️','총 학습일',s.studyDays+'일')+
     tile('✍️','오늘',s.today+UNIT())+'</div>';
  if(!calYM){var n=new Date();calYM={y:n.getFullYear(),m:n.getMonth()};}
  h+='<div class="hh-calwrap">';
  h+='<div class="hh-calhead"><button class="hh-calnav" id="hh-cal-prev">‹</button>'+
     '<div class="hh-caltt">'+calYM.y+'년 <span class="mm">'+(calYM.m+1)+'월</span></div>'+
     '<button class="hh-calnav" id="hh-cal-next">›</button></div>';
  h+='<div class="hh-dow"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>';
  h+='<div class="hh-grid">'+monthCells(calYM.y,calYM.m,days)+'</div>';
  // month summary
  var mPrefix=calYM.y+'-'+String(calYM.m+1).padStart(2,'0');
  var mDays=0,mAtt=0,mCor=0;
  Object.keys(days).forEach(function(d){if(d.indexOf(mPrefix)===0){if(days[d].a>0)mDays++;mAtt+=days[d].a;mCor+=days[d].c;}});
  var mAcc=mAtt?Math.round(mCor/mAtt*100):0;
  h+='<div class="hh-calsum">이 달 — 학습 <b>'+mDays+'일</b> · 푼 문제 <b>'+mAtt+UNIT()+'</b> · 정답률 <b>'+mAcc+'%</b></div>';
  // last 7 days mini bars
  h+=last7(days);
  h+='</div>';
  h+='<div class="hh-foot">달력의 각 칸은 그 날 푼 문제 수입니다. 색이 진할수록 많이 푼 날이며, 오늘은 금색 테두리로 표시됩니다. 진도는 이 브라우저에 저장되며 게임을 풀면 자동으로 쌓입니다.</div>';
  return h;
}
function tile(ic,lab,val){return '<div class="hh-tile"><div class="hh-tic">'+ic+'</div><div class="hh-tval">'+val+'</div><div class="hh-tlab">'+lab+'</div></div>';}
function lvl(n){return n===0?0:(n<3?1:(n<7?2:(n<15?3:4)));}
function monthCells(y,m,days){
  var first=new Date(y,m,1),start=first.getDay(),dim=new Date(y,m+1,0).getDate();
  var t=today();var cells='';
  for(var i=0;i<start;i++)cells+='<div class="hh-day pad"></div>';
  for(var dnum=1;dnum<=dim;dnum++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dnum).padStart(2,'0');
    var v=days[ds]?days[ds].a:0;var L=lvl(v);
    var cls='hh-day'+(L?' l'+L:'')+(ds===t?' today':'')+(ds>t?' future':'');
    cells+='<div class="'+cls+'" title="'+ds+(v?' · '+v+UNIT():'')+'"><span class="dn">'+dnum+'</span>'+(v?'<span class="dc">'+v+'</span>':'')+'</div>';
  }
  return cells;
}
function last7(days){
  var arr=[],max=1,t=today();
  for(var i=6;i>=0;i--){var ds=addDays(t,-i);var v=days[ds]?days[ds].a:0;arr.push({ds:ds,v:v});if(v>max)max=v;}
  var wd=['일','월','화','수','목','금','토'];

/* ===================== ANALYSIS VIEW ===================== */
function catAgg(){
  return collectCats().filter(function(c){return c.seen>=2&&c.wrong>0;}).sort(function(a,b){return (b.rate-a.rate)||(b.wrong-a.wrong);});
}
function weakAll(){return collectQ().filter(function(e){return e.wrong>0;}).sort(function(a,b){return (b.wrong-a.wrong)||(b.wrongRate-a.wrongRate)||(b.seen-a.seen);});}
function weakByTool(){var m={};weakAll().forEach(function(e){(m[e.tool]=m[e.tool]||[]).push(e);});return m;}
function toolLabel(id){if(CFG&&CFG.toolLabel)return CFG.toolLabel(id)||id;return id;}

/* ---- export builders ---- */
function buildExport(includeRaw){
  var s=summary(),weak=weakAll(),days=collectDays();
  var exp={
    meta:{app:(CFG&&CFG.title)||CFG.key,key:CFG.key,exportedAt:new Date().toISOString(),today:today(),schema:1,
      note:'weakSpots=문항별 오답(문제·정답 포함). dailyActivity=일별 풀이/정답. raw=원본 저장.'},
    summary:{streak:s.streak,bestStreak:s.best,studyDays:s.studyDays,totalAttempts:s.attempts,overallAccuracy:s.acc,trackedQuestions:s.trackedQ,weakQuestions:s.weakQ},
    categories:catAgg().map(function(c){return {category:c.cat,seen:c.seen,wrong:c.wrong,wrongRate:c.rate};}),
    weakSpots:weak.map(function(e){return {tool:e.tool,toolLabel:toolLabel(e.tool),id:e.id,question:strip(e.q)||null,category:e.cat,answer:e.a||null,seen:e.seen,wrong:e.wrong,wrongRate:e.wrongRate,myWrongPicks:e.picks,lastWrong:e.lastWrong};}),
    dailyActivity:Object.keys(days).sort().map(function(d){return {date:d,attempts:days[d].a,correct:days[d].c};})
  };
  if(includeRaw){var raw={};raw[skey()]=ST;if(CFG&&CFG.rawKeys){CFG.rawKeys.forEach(function(k){var o=readJSON(k);if(o)raw[k]=o;});}exp.raw=raw;}
  return exp;
}
function buildMD(){
  var s=summary(),weak=weakAll().slice(0,50),cats=catAgg();
  var md='# '+((CFG&&CFG.title)||CFG.key)+' 학습 현황 ('+today()+')\n\n';
  md+='- 연속 '+s.streak+'일 (최고 '+s.best+'일) · 총 학습일 '+s.studyDays+'일\n';
  md+='- 총 풀이 '+s.attempts+UNIT()+' · 정답률 '+s.acc+'% · 추적 문항 '+s.trackedQ+' · 오답 문항 '+s.weakQ+'\n\n';
  if(cats.length){md+='## 약한 귀속 (오답률 순)\n\n| 귀속 | 오답률 | 틀림/시도 |\n|---|---|---|\n';
    cats.slice(0,15).forEach(function(c){md+='| '+String(c.cat).replace(/\|/g,'/')+' | '+c.rate+'% | '+c.wrong+'/'+c.seen+' |\n';});md+='\n';}
  if(weak.length){md+='## 오답 많은 문항 (상위 '+weak.length+')\n\n| 귀속 | 문제 | 정답 | 틀림/시도 |\n|---|---|---|---|\n';
    weak.forEach(function(e){var q=strip(e.q).replace(/\|/g,'/').replace(/\n/g,' ').slice(0,70);md+='| '+String(e.cat).replace(/\|/g,'/')+' | '+q+' | '+String(e.a||'').replace(/\|/g,'/').slice(0,40)+' | '+e.wrong+'/'+e.seen+' |\n';});
  }else{md+='_아직 기록된 오답 문항이 없습니다._\n';}
  return md;
}
function setNote(m){var n=root.querySelector('#hh-exp-note');if(n)n.textContent=m||'';}
function copyText(txt,ok){
  var ta=root.querySelector('#hh-exp-ta');
  function fb(){try{ta.removeAttribute('readonly');ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);var r=document.execCommand('copy');ta.setAttribute('readonly','readonly');setNote(r?(ok||'복사됨')+' (텍스트 영역)':'자동 복사 실패 — 아래 텍스트를 직접 선택해 복사하세요');}catch(e){setNote('자동 복사 실패 — 아래 텍스트를 직접 선택해 복사');}}
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){setNote(ok||'복사됨');},fb);}else{fb();}}catch(e){fb();}
}
function downloadText(name,txt,mime){
  try{var blob=new Blob([txt],{type:mime||'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=name;a.style.display='none';document.body.appendChild(a);a.click();setTimeout(function(){try{document.body.removeChild(a);}catch(e){}try{URL.revokeObjectURL(url);}catch(e){}},200);setNote('다운로드 시작: '+name);}catch(e){setNote('다운로드 실패 — JSON 복사를 사용하세요');}
}
function refreshExport(){
  try{var raw=root.querySelector('#hh-exp-raw').checked;var json=JSON.stringify(buildExport(raw),null,2);root.querySelector('#hh-exp-ta').value=json;
    var s=summary();setNote(s.trackedQ?'아래 JSON을 복사하거나 파일로 저장해 Claude에게 붙여넣으세요.':'게임을 몇 문제 풀고 다시 열면 오답 통계가 채워집니다.');}catch(e){setNote('내보내기 오류: '+(e&&e.message||e));}
}
/* ---- compare ---- */
function deltaTag(d){if(d>0)return '<span class="hh-up">▲'+d+'</span>';if(d<0)return '<span class="hh-down">▼'+(-d)+'</span>';return '<span class="hh-flat">—</span>';}
function runCompare(txt){
  var out=root.querySelector('#hh-cmp-out');if(!out)return;
  var old=null;try{var o=JSON.parse(txt);if(o&&o.summary)old=o;}catch(e){}
  if(!old){out.innerHTML='<div class="hh-cmp-err">JSON을 읽지 못했습니다. 이전에 내보낸 통계 JSON 전체(중괄호 포함)를 붙여넣어 주세요.</div>';return;}
  var cur=buildExport(false);var oldDate=(old.meta&&old.meta.today)?old.meta.today:'이전';
  var oa=old.summary.overallAccuracy||0,ca=cur.summary.overallAccuracy||0,op=old.summary.totalAttempts||0,cp=cur.summary.totalAttempts||0;
  var h='<div class="hh-cmp-line">'+oldDate+' → 오늘 · 정답률 '+oa+'% → <b>'+ca+'%</b> '+deltaTag(ca-oa)+' · 풀이 '+op+' → '+cp+' (+'+Math.max(0,cp-op)+')</div>';
  var ow={};(old.weakSpots||[]).forEach(function(w){ow[w.tool+'::'+w.id]=w;});
  var cw={};(cur.weakSpots||[]).forEach(function(w){cw[w.tool+'::'+w.id]=w;});
  var fixed=[],worse=[],neww=[];
  Object.keys(ow).forEach(function(k){if(!cw[k])fixed.push(ow[k]);else if((cw[k].wrong||0)>(ow[k].wrong||0))worse.push(cw[k]);});
  Object.keys(cw).forEach(function(k){if(!ow[k])neww.push(cw[k]);});
  h+='<div class="hh-cmp-sub">오답 문항 변화</div><div class="hh-cmp-line2">✅ 해결 <b>'+fixed.length+'</b> · ⚠️ 더 틀림 <b>'+worse.length+'</b> · 🆕 새 오답 <b>'+neww.length+'</b></div>';
  function mini(lab,list){if(!list.length)return '';return '<div class="hh-cmp-mini">'+lab+' '+list.slice(0,6).map(function(w){return esc(String(w.question||w.id)).slice(0,30);}).join(' · ')+(list.length>6?' …':'')+'</div>';}
  h+=mini('개선:',fixed)+mini('새 오답:',neww);
  out.innerHTML=h;
}

/* ===================== DIGEST VIEW ===================== */
function autoSummary(cats,qs,acc){
  var worst=cats.slice(0,3);
  var s='현재 정답률 <b>'+acc+'%</b>. ';
  if(worst.length)s+='가장 약한 귀속은 '+worst.map(function(c){return '<b>'+esc(c.cat)+'</b>('+c.rate+'%)';}).join(', ')+'. ';
  var conf=qs.slice(0,3).map(function(x){var p=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];})[0];return p?('“'+esc(strip(x.q).slice(0,14))+'…”를 “'+esc(p)+'”로 혼동'):'';}).filter(Boolean);
  if(conf.length)s+='대표 혼동 — '+conf.join('; ')+'. ';
  if(worst[0])s+='→ <b>'+esc(worst[0].cat)+'</b> 집중 복습 권장.';
  return s;
}
function renderDigest(){
  var s=summary(),cats=collectCats().filter(function(c){return c.wrong>0;}).sort(function(a,b){return (b.wrong-a.wrong)||(b.rate-a.rate);});
  var qs=weakAll();
  if(s.attempts===0){
    return '<div class="hh-sec"><div class="hh-sec-h">약점 다이제스트 <span>반복 오답·귀속 자동 정리</span></div>'+
      '<div class="hh-empty">아직 푼 문제가 없습니다.<br>게임에서 문제를 풀면, 자주 틀리는 <b>귀속</b>과 반복 오답 문항을 모아 자동으로 정리하고, <b>오답만 복습</b>·<b>텍스트 복사</b>를 제공합니다.</div></div>';
  }
  var h='<div class="hh-sec"><div class="hh-sec-h">약점 다이제스트 <span>반복 오답·귀속 자동 정리</span></div>';
  h+='<div class="hh-sum">총 <b>'+s.attempts+'</b>회 시도 · 오답 <b>'+s.wrong+'</b>회 · 정답률 <b>'+s.acc+'%</b> · 반복오답 문항 <b>'+qs.length+'</b>개</div>';
  h+='<div class="hh-sec-h">귀속별 오답 — 약한 순</div><div class="hh-bars">';
  if(!cats.length)h+='<div class="hh-empty">오답이 없습니다. 완벽합니다.</div>';
  cats.forEach(function(c){h+='<div><div class="hh-bar-l"><span class="hh-bcat">'+esc(c.cat)+'</span><span class="hh-bnum">'+c.wrong+'/'+c.seen+' ('+c.rate+'%)</span></div><div class="hh-bt"><i style="width:'+Math.max(6,c.rate)+'%"></i></div></div>';});
  h+='</div>';
  h+='<div class="hh-sec-h">반복 오답 문항 — 많이 틀린 순</div><div class="hh-qs">';
  if(!qs.length)h+='<div class="hh-empty">반복 오답이 아직 없습니다.</div>';
  qs.slice(0,12).forEach(function(x){
    var picks=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];});
    var pickStr=picks.length?picks.map(function(p){return '“'+esc(p)+'”×'+x.picks[p];}).join(', '):'—';
    h+='<div class="hh-q"><div class="hh-q-top"><span class="hh-tag">'+esc(x.cat)+'</span><span class="hh-qmiss">'+x.wrong+'회 오답</span></div>'+
       '<div class="hh-q-q">'+esc(strip(x.q)||x.id)+'</div>'+
       '<div class="hh-q-a">내 오답: <span class="bad">'+pickStr+'</span> &nbsp;→&nbsp; 정답: <span class="good">'+esc(x.a)+'</span></div></div>';});
  h+='</div>';
  h+='<div class="hh-sec-h">자동 요약</div><div class="hh-auto">'+autoSummary(cats,qs,s.acc)+'</div>';

  if(CFG&&typeof CFG.review==='function')h+='<button class="hh-btn" id="hh-d-review">오답만 복습 ('+qs.length+')</button>';
  h+='<button class="hh-btn ghost" id="hh-d-copy">텍스트 복사</button>';
  h+='</div></div>';

}
function digestText(){
  var s=summary(),cats=collectCats().filter(function(c){return c.wrong>0;}).sort(function(a,b){return b.wrong-a.wrong;}),qs=weakAll();
  var L=['['+((CFG&&CFG.title)||CFG.key)+' 약점 다이제스트]','총 '+s.attempts+'회 시도 · 오답 '+s.wrong+'회 · 정답률 '+s.acc+'%','','■ 귀속별 오답 (약한 순)'];
  cats.forEach(function(c){L.push(' · '+c.cat+' : '+c.wrong+'/'+c.seen+' ('+c.rate+'%)');});
  L.push('');L.push('■ 반복 오답 문항');
  qs.slice(0,15).forEach(function(x){var picks=Object.keys(x.picks).sort(function(a,b){return x.picks[b]-x.picks[a];});var ps=picks.map(function(p){return '“'+p+'”×'+x.picks[p];}).join(', ');L.push(' · ['+x.cat+'] '+strip(x.q));L.push('     내 오답: '+(ps||'—')+' → 정답: '+(x.a||'')+'  ('+x.wrong+'회)');});

    var nb=root.querySelector('#hh-note-btn');
    if(nb)nb.addEventListener('click',function(){var box=root.querySelector('#hh-note');var show=(box.style.display==='none');box.style.display=show?'block':'none';nb.textContent=show?'📝 약점 노트 접기':'📝 약점 노트 펼치기 (문제→정답)';if(show)renderNote();});
    root.querySelectorAll('[data-drill]').forEach(function(b){b.addEventListener('click',function(){var tool=b.dataset.drill;var ids=(weakByTool()[tool]||[]).map(function(e){return e.id;});if(ids.length&&CFG.drill)CFG.drill(tool,ids);});});
    var ec=root.querySelector('#hh-exp-copy');if(ec)ec.addEventListener('click',function(){try{var raw=root.querySelector('#hh-exp-raw').checked;var json=JSON.stringify(buildExport(raw),null,2);root.querySelector('#hh-exp-ta').value=json;copyText(json,'JSON 복사됨');}catch(e){setNote('오류: '+(e&&e.message||e));}});
    var ed=root.querySelector('#hh-exp-dl');if(ed)ed.addEventListener('click',function(){try{var raw=root.querySelector('#hh-exp-raw').checked;downloadText((CFG.key||'hub')+'_통계_'+today()+'.json',JSON.stringify(buildExport(raw),null,2),'application/json');}catch(e){setNote('오류');}});
    var em=root.querySelector('#hh-exp-md');if(em)em.addEventListener('click',function(){try{root.querySelector('#hh-exp-ta').value=buildMD();copyText(buildMD(),'요약(MD) 복사됨');}catch(e){setNote('오류');}});
    var er=root.querySelector('#hh-exp-raw');if(er)er.addEventListener('change',refreshExport);
    var ct=root.querySelector('#hh-cmp-toggle');if(ct)ct.addEventListener('click',function(){var b=root.querySelector('#hh-cmp-body');b.style.display=(b.style.display==='none')?'block':'none';});
    var cr=root.querySelector('#hh-cmp-run');if(cr)cr.addEventListener('click',function(){runCompare(root.querySelector('#hh-cmp-in').value);});
    var cfb=root.querySelector('#hh-cmp-file-btn');if(cfb)cfb.addEventListener('click',function(){var f=root.querySelector('#hh-cmp-file');if(f)f.click();});
    var cf=root.querySelector('#hh-cmp-file');if(cf)cf.addEventListener('change',function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){root.querySelector('#hh-cmp-in').value=r.result;runCompare(r.result);};try{r.readAsText(f);}catch(err){}});
    refreshExport();
  }
  if(curView==='digest'){
    var rv=root.querySelector('#hh-d-review');if(rv&&CFG.review)rv.addEventListener('click',function(){var ids=weakAll().map(function(e){return e.id;});CFG.review(ids);});
    var cp=root.querySelector('#hh-d-copy');if(cp)cp.addEventListener('click',function(){var t=digestText();try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t);}else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}}catch(e){}cp.textContent='복사됨 ✓';setTimeout(function(){if(cp)cp.textContent='텍스트 복사';},1500);});
  }
}

function mount(el,opts){
  var _pk=(CFG&&CFG.key); CFG=opts||{}; if(!CFG.key)CFG.key=_pk||'hub';
  ensureST(); root=el; curView=CFG.startView||'cal';
  root.classList.add('hh'); root.innerHTML=views();
  root.querySelectorAll('.hh-segb').forEach(function(b){b.addEventListener('click',function(){switchView(b.dataset.seg);});});
  paint();
  return window.HubHome;
}
function refresh(){if(root)paint();}

window.HubHome={mount:mount,refresh:refresh,record:record,logGame:logGame,tick:tick,touch:touch,setKey:setKey,
  store:function(){return ensureST();},config:function(){return CFG;},_export:buildExport};
})();
</script>

<script>try{HubHome.setKey('jongqishinhyul');}catch(e){}</script>
</body>
</html>
